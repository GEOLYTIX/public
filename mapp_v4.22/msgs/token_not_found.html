<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:site_name" content="Geolytix MAPP" />
  <meta property="og:title" content="Already Verified | Geolytix MAPP" />
  <meta property="og:type" content="website" />

  <title>Already Verified | Geolytix MAPP</title>

  <link rel="icon" type="image/x-icon" href="https://geolytix.github.io/public/icons/favicon.svg" />
  <link rel="stylesheet" href="https://geolytix.github.io/public/mapp_v4.22/app.css" />
</head>

<body>
  <main>

    <div class="form-container">
      <div class="form-container__inner">
        <div class="flow">
          <div class="text-align-center">
            <div class="gap-bottom-600">
              <img src="https://geolytix.github.io/public/mapp_v4.22/mapp_logo.svg" class="logo" alt="Geolytix logo">
              <h1 class="login-heading">GEOLYTIX</h1>
            </div>

            <h1 class="form-container__title">Verification Link Already Used</h1>
            <p>What happens next?</p>
          </div>

          <div class="panel">
            <p>The verification link has already been used.</p>
            <p>You are now able to login.</p>
            <p class="gap-top-700"><a id="login-link">Login Here</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>

<script>

// Update the login link to include the current directory
let path = window.location.href;
// Remove anything after api
path = path.replace(/\/api.*/g, '');

// Update the login link
document.getElementById('login-link').href = path;

</script>
</html>
